name: Guardrails Check

on: [pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check for forbidden changes to agent definitions
        run: |
          if git diff --name-only origin/main | grep -E '^\.github/(agents|skills|workflows|guardrails|copilot-instructions)'; then
            echo "Changes detected to protected agent files. Manual review required."
            # In real setup, this could fail the job or post a comment
          fi
      - name: Validate structure
        run: echo "Would run structure validation for templates/ separation here."